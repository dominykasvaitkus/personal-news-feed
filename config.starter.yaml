feed:
  title: "Personal Combined Feed"
  description: "Personal aggregate feed"
  link: "https://example.invalid"
  language: "en"
  max_items: 250
  content_mode: "summary"  # allowed: summary, link
  output_filename: "feed.xml"

privacy:
  mode: "secret_path"  # allowed: public, secret_path
  token_env: "NEWS_FEED_PRIVATE_TOKEN"

sources:
  - id: "arxiv-cs-ai"
    name: "arXiv cs.AI"
    type: "rss"
    enabled: true
    timeout_seconds: 20
    url: "https://rss.arxiv.org/rss/cs.AI"

  - id: "arxiv-cs-lg"
    name: "arXiv cs.LG"
    type: "rss"
    enabled: true
    timeout_seconds: 20
    url: "https://rss.arxiv.org/rss/cs.LG"

  - id: "openai-blog"
    name: "OpenAI Blog"
    type: "rss"
    enabled: true
    timeout_seconds: 20
    url: "https://openai.com/news/rss.xml"

  - id: "google-ai-blog"
    name: "Google AI / Technology Blog"
    type: "rss"
    enabled: true
    timeout_seconds: 20
    url: "https://blog.google/technology/ai/rss/"

  - id: "huggingface-blog"
    name: "Hugging Face Blog"
    type: "rss"
    enabled: true
    timeout_seconds: 20
    url: "https://huggingface.co/blog/feed.xml"

  - id: "paperswithcode-trending"
    name: "Papers with Code (via Hugging Face Trending Papers)"
    type: "web"
    enabled: true
    timeout_seconds: 20
    max_items: 25
    url: "https://huggingface.co/papers/trending"
    item_selector: "article h3 a[href^='/papers/']"
    base_url: "https://huggingface.co"

  - id: "ai-news"
    name: "Artificial Intelligence News"
    type: "rss"
    enabled: true
    timeout_seconds: 20
    url: "https://www.artificialintelligence-news.com/feed/"

  - id: "hn-ai-newest"
    name: "Hacker News AI-filtered"
    type: "rss"
    enabled: true
    timeout_seconds: 20
    url: "https://hnrss.org/newest?q=AI"

  - id: "major-updates"
    name: "Project Major Updates"
    type: "updates"
    enabled: true
    timeout_seconds: 20
    max_items: 5
    file_path: "updates/major_updates.yaml"

  - id: "lobsters-web"
    name: "Lobsters Web"
    type: "web"
    enabled: false
    timeout_seconds: 20
    url: "https://lobste.rs/"
    item_selector: "li.story"
    title_selector: "a.u-url"
    summary_selector: ".description"
    base_url: "https://lobste.rs"

  - id: "newsletter"
    name: "Newsletter Inbox"
    type: "email"
    enabled: false
    timeout_seconds: 20
    host: "imap.gmail.com"
    port: 993
    username: "your-email@gmail.com"
    password_env: "NEWS_FEED_EMAIL_PASSWORD"
    folder: "INBOX"
    sender_allowlist:
      - "newsletter@"
      - "substack.com"
      - "beehiiv"

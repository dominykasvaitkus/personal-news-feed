name: Build RSS Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare config
        run: cp config.starter.yaml config.yaml

      - name: Validate private token configuration
        env:
          NEWS_FEED_PRIVATE_TOKEN: ${{ secrets.NEWS_FEED_PRIVATE_TOKEN || vars.NEWS_FEED_PRIVATE_TOKEN }}
        run: |
          if [ -z "$NEWS_FEED_PRIVATE_TOKEN" ]; then
            echo "Missing NEWS_FEED_PRIVATE_TOKEN."
            echo "Add it in: Settings > Secrets and variables > Actions > Repository secrets."
            echo "Accepted fallback: Repository variable NEWS_FEED_PRIVATE_TOKEN."
            exit 1
          fi

      - name: Build feed
        env:
          NEWS_FEED_EMAIL_PASSWORD: ${{ secrets.NEWS_FEED_EMAIL_PASSWORD }}
          NEWS_FEED_PRIVATE_TOKEN: ${{ secrets.NEWS_FEED_PRIVATE_TOKEN || vars.NEWS_FEED_PRIVATE_TOKEN }}
        run: python -m src.aggregator

      - name: Commit feed output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.xml state/seen_hashes.json
          git diff --cached --quiet || git commit -m "chore: update generated feed"
          git push
